<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Wave icon by Freepik — flaticon.com/free-icon/wave_616545 (credited in README). -->
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/616/616545.png" />
    <meta
      name="description"
      content="Wavelytics is the operations & compliance intelligence platform that gives regulated, ops-heavy teams a single pane of glass over service performance, operational health, risk, and audit readiness."
    />
    <title>Wavelytics — Operations &amp; Compliance Intelligence</title>
    <script>
      // Set the theme before first paint to avoid a flash.
      (function () {
        try {
          var t = localStorage.getItem("wavelytics-theme");
          if (!t)
            t = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/landing/main.jsx"></script>
  </body>
</html>
