<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Wave wordmark glyph as an inline SVG favicon. -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2338bdf8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M2 9 q2.75 -3 5.5 0 t5.5 0 t5.5 0'/%3E%3Cpath d='M2 15 q2.75 -3 5.5 0 t5.5 0 t5.5 0'/%3E%3C/svg%3E" />
    <title>Wavelytics — Console</title>
    <script>
      // Set the theme before first paint to avoid a flash.
      (function () {
        try {
          var t = localStorage.getItem("wavelytics-theme");
          if (!t)
            t = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
